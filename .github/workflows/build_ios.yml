name: Build Avalonia iOS

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Commit, tag, or branch to build (defaults to the workflow revision)
        required: false
        type: string
      device_aot_mode:
        description: Managed execution mode for the device IPA
        required: true
        default: hybrid
        type: choice
        options:
          - hybrid
          - full
          - interpreter
      run_simulator:
        description: Also run the iPad simulator smoke test
        required: true
        default: false
        type: boolean
      symbolicate_load_address:
        description: Optional hexadecimal load address from an iOS crash report
        required: false
        type: string
      symbolicate_addresses:
        description: Optional space-separated absolute addresses to resolve with atos
        required: false
        type: string
  push:
    paths:
      - "ClassIsland.Mobile.Avalonia/**"
      - "ClassIsland.Mobile/**"
      - "ClassIsland/**"
      - "ClassIsland.Core/**"
      - "ClassIsland.Platforms.Abstractions/**"
      - "ClassIsland.Shared/**"
      - "ClassIsland.Shared.IPC/**"
      - "roslyn/IconsMappingGenerator/**"
      - "vendors/**"
      - "AvaloniaShared.props"
      - "CrossPlatformProps.props"
      - "Global.props"
      - "global.json"
      - ".gitmodules"
      - ".github/workflows/build_ios.yml"
  pull_request:
    paths:
      - "ClassIsland.Mobile.Avalonia/**"
      - "ClassIsland.Mobile/**"
      - "ClassIsland/**"
      - "ClassIsland.Core/**"
      - "ClassIsland.Platforms.Abstractions/**"
      - "ClassIsland.Shared/**"
      - "ClassIsland.Shared.IPC/**"
      - "roslyn/IconsMappingGenerator/**"
      - "vendors/**"
      - "AvaloniaShared.props"
      - "CrossPlatformProps.props"
      - "Global.props"
      - "global.json"
      - ".gitmodules"
      - ".github/workflows/build_ios.yml"

permissions:
  contents: read
  packages: read

concurrency:
  group: avalonia-ios-${{ github.workflow }}-${{ github.ref }}-${{ inputs.source_ref || 'current' }}-${{ inputs.device_aot_mode || 'hybrid' }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  IOS_PROJECT: ClassIsland.Mobile.Avalonia.iOS/ClassIsland.Mobile.Avalonia.iOS.csproj
  IPA_NAME: ClassIsland-Avalonia-iOS-unsigned.ipa
  DEVICE_AOT_MODE: ${{ inputs.device_aot_mode || 'hybrid' }}
  SYMBOLICATE_LOAD_ADDRESS: ${{ inputs.symbolicate_load_address || '' }}
  SYMBOLICATE_ADDRESSES: ${{ inputs.symbolicate_addresses || '' }}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    defaults:
      run:
        shell: bash
        working-directory: ClassIsland.Mobile.Avalonia

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET 8 and 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Show build environment
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          echo "SOURCE_SHA=$source_sha" >> "$GITHUB_ENV"
          echo "Source revision: $source_sha"
          echo "Device AOT mode: $DEVICE_AOT_MODE"
          dotnet --info
          dotnet --version | grep -E '^9\.0\.'
          xcodebuild -version
          xcode-select -p

      - name: Add GitHub Package Registry
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          dotnet nuget add source \
            --username ClassIsland \
            --password "$GITHUB_PACKAGES_TOKEN" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/ClassIsland/index.json"

      - name: Restore iOS workload
        run: |
          set -euo pipefail
          dotnet workload restore "$IOS_PROJECT"

      - name: Restore packages
        run: |
          set -euo pipefail
          dotnet restore "$IOS_PROJECT" \
            --runtime ios-arm64 \
            --disable-parallel

      - name: Publish unsigned device app
        run: |
          set -euo pipefail
          aot_properties=()
          case "$DEVICE_AOT_MODE" in
            hybrid)
              aot_properties+=("-p:MtouchInterpreter=-all,ClassIsland.Core")
              ;;
            full)
              aot_properties+=(
                "-p:MtouchInterpreter=-all"
                "-p:MtouchUseLlvm=false"
                "-p:_IsDedupEnabled=false"
              )
              ;;
            interpreter)
              aot_properties+=(
                "-p:MtouchInterpreter=all"
                "-p:_IsDedupEnabled=false"
              )
              ;;
            *)
              echo "Unsupported device AOT mode: $DEVICE_AOT_MODE" >&2
              exit 2
              ;;
          esac

          dotnet publish "$IOS_PROJECT" \
            --configuration Release \
            --framework net8.0-ios \
            --runtime ios-arm64 \
            --no-restore \
            --maxcpucount:1 \
            -p:EnableCodeSigning=false \
            -p:CodesignEntitlements= \
            -p:ArchiveOnBuild=false \
            -p:BuildIpa=false \
            -p:ValidateXcodeVersion=false \
            "${aot_properties[@]}" \
            -bl:"$RUNNER_TEMP/ClassIsland-Avalonia-iOS.binlog"

      - name: Package unsigned IPA
        run: |
          set -euo pipefail

          search_root="$GITHUB_WORKSPACE/ClassIsland.Mobile.Avalonia/ClassIsland.Mobile.Avalonia.iOS/bin/Release/net8.0-ios/ios-arm64"
          app_path="$(find "$search_root" -type d -name '*.app' -prune -print | sed -n '1p')"
          test -n "$app_path"
          test -d "$app_path"
          test -f "$app_path/Info.plist"
          test -f "$app_path/Assets.car"
          test -d "$app_path/PlugIns/ClassIslandLiveActivity.appex"
          test -f "$app_path/PlugIns/ClassIslandLiveActivity.appex/Info.plist"

          /usr/bin/plutil -lint "$app_path/Info.plist"
          /usr/bin/plutil -lint "$app_path/PlugIns/ClassIslandLiveActivity.appex/Info.plist"
          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/Info.plist")"
          executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_path/Info.plist")"
          app_icon_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName' "$app_path/Info.plist")"
          extension_bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/PlugIns/ClassIslandLiveActivity.appex/Info.plist")"
          extension_executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_path/PlugIns/ClassIslandLiveActivity.appex/Info.plist")"
          test "$bundle_id" = "cn.classisland.mobile.avalonia"
          test "$app_icon_name" = "AppIcon"
          test "$extension_bundle_id" = "cn.classisland.mobile.avalonia.liveactivity"
          test -f "$app_path/$executable"
          test -f "$app_path/PlugIns/ClassIslandLiveActivity.appex/$extension_executable"
          /usr/bin/file "$app_path/$executable" | grep -q 'arm64'
          /usr/bin/file "$app_path/PlugIns/ClassIslandLiveActivity.appex/$extension_executable" | grep -q 'arm64'
          if [[ "$DEVICE_AOT_MODE" == "full" ]]; then
            test -f "$app_path/ClassIsland.Core.aotdata.arm64"
          else
            test ! -f "$app_path/ClassIsland.Core.aotdata.arm64"
          fi

          package_dir="$RUNNER_TEMP/ClassIsland-Avalonia-ipa"
          output_dir="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$package_dir/Payload" "$output_dir"
          /usr/bin/ditto \
            "$app_path" \
            "$package_dir/Payload/$(basename "$app_path")"
          /usr/bin/ditto \
            -c -k --sequesterRsrc --keepParent \
            "$package_dir/Payload" \
            "$output_dir/$IPA_NAME"

          /usr/bin/unzip -tqq "$output_dir/$IPA_NAME"
          archive_listing="$RUNNER_TEMP/ClassIsland-Avalonia-ipa-files.txt"
          /usr/bin/unzip -Z1 "$output_dir/$IPA_NAME" > "$archive_listing"
          grep -Eq '^Payload/[^/]+\.app/Info\.plist$' "$archive_listing"
          grep -Eq '^Payload/[^/]+\.app/PlugIns/ClassIslandLiveActivity\.appex/Info\.plist$' "$archive_listing"

          (
            cd "$output_dir"
            shasum -a 256 "$IPA_NAME" > "$IPA_NAME.sha256"
          )
          printf '%s\n' "$DEVICE_AOT_MODE" > "$output_dir/aot-mode.txt"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsland-Avalonia-iOS-${{ env.DEVICE_AOT_MODE }}-${{ env.SOURCE_SHA }}
          path: |
            artifacts/${{ env.IPA_NAME }}
            artifacts/${{ env.IPA_NAME }}.sha256
            artifacts/aot-mode.txt
          if-no-files-found: error
          retention-days: 14

      - name: Collect device diagnostics
        if: always()
        run: |
          set +e
          diagnostics="$RUNNER_TEMP/ClassIsland-Avalonia-iOS-diagnostics"
          search_root="$GITHUB_WORKSPACE/ClassIsland.Mobile.Avalonia/ClassIsland.Mobile.Avalonia.iOS/bin/Release/net8.0-ios/ios-arm64"
          mkdir -p "$diagnostics"

          if [[ -f "$RUNNER_TEMP/ClassIsland-Avalonia-iOS.binlog" ]]; then
            cp "$RUNNER_TEMP/ClassIsland-Avalonia-iOS.binlog" "$diagnostics/"
          fi

          app_path="$(find "$search_root" -type d -name '*.app' -prune -print 2>/dev/null | sed -n '1p')"
          if [[ -n "$app_path" && -f "$app_path/Info.plist" ]]; then
            executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_path/Info.plist")"
            if [[ -f "$app_path/$executable" ]]; then
              /usr/bin/file "$app_path/$executable" > "$diagnostics/executable.txt" 2>&1
              /usr/bin/dwarfdump --uuid "$app_path/$executable" > "$diagnostics/uuid.txt" 2>&1
              xcrun dsymutil \
                "$app_path/$executable" \
                -o "$diagnostics/$executable.app.dSYM" \
                > "$diagnostics/dsymutil.log" 2>&1 || true
              dwarf_binary="$diagnostics/$executable.app.dSYM/Contents/Resources/DWARF/$executable"
              if [[ -f "$dwarf_binary" && -n "$SYMBOLICATE_LOAD_ADDRESS" && -n "$SYMBOLICATE_ADDRESSES" ]]; then
                read -r -a crash_addresses <<< "$SYMBOLICATE_ADDRESSES"
                xcrun atos \
                  -arch arm64 \
                  -o "$dwarf_binary" \
                  -l "$SYMBOLICATE_LOAD_ADDRESS" \
                  "${crash_addresses[@]}" \
                  > "$diagnostics/atos.txt" 2>&1 || true
              fi
            fi

            find "$app_path" -maxdepth 1 -type f -name '*.aotdata.arm64' -print \
              | sort > "$diagnostics/aot-files.txt"
          fi

          while IFS= read -r -d '' dsym; do
            destination="$diagnostics/$(basename "$dsym")"
            if [[ "$dsym" != "$destination" ]]; then
              /usr/bin/ditto "$dsym" "$destination"
            fi
          done < <(find "$search_root" -type d -name '*.dSYM' -print0 2>/dev/null)

          find "$search_root" -type f \( -name '*.mSYM' -o -name '*.map' \) -exec cp {} "$diagnostics/" \; 2>/dev/null || true
          exit 0

      - name: Upload device diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsland-Avalonia-iOS-diagnostics-${{ env.DEVICE_AOT_MODE }}-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/ClassIsland-Avalonia-iOS-diagnostics
          if-no-files-found: warn
          retention-days: 14

  simulator-smoke:
    if: github.event_name != 'workflow_dispatch' || inputs.run_simulator
    runs-on: macos-15
    timeout-minutes: 60

    defaults:
      run:
        shell: bash
        working-directory: ClassIsland.Mobile.Avalonia

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET 8 and 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Add GitHub Package Registry
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          dotnet nuget add source \
            --username ClassIsland \
            --password "$GITHUB_PACKAGES_TOKEN" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/ClassIsland/index.json"

      - name: Restore iOS workload
        run: |
          set -euo pipefail
          dotnet workload restore "$IOS_PROJECT"

      - name: Restore simulator packages
        run: |
          set -euo pipefail
          dotnet restore "$IOS_PROJECT" \
            --runtime iossimulator-arm64 \
            --disable-parallel

      - name: Build simulator app
        run: |
          set -euo pipefail
          dotnet build "$IOS_PROJECT" \
            --configuration Debug \
            --framework net8.0-ios \
            --runtime iossimulator-arm64 \
            --no-restore \
            --maxcpucount:1 \
            -p:EnableCodeSigning=false \
            -p:CodesignEntitlements= \
            -p:MtouchInterpreter=all \
            -p:_IsDedupEnabled=false \
            -p:ValidateXcodeVersion=false \
            -bl:"$RUNNER_TEMP/ClassIsland-Avalonia-iOS-simulator.binlog"

      - name: Boot iPad Simulator
        run: |
          set -euo pipefail
          simulator_list="$RUNNER_TEMP/available-simulators.json"
          xcrun simctl list devices available --json > "$simulator_list"
          simulator_udid="$(jq -r \
            '[.devices[][] | select(.isAvailable == true and (.name | startswith("iPad")))] | first | .udid // empty' \
            "$simulator_list")"
          simulator_name="$(jq -r \
            --arg udid "$simulator_udid" \
            '[.devices[][] | select(.udid == $udid)] | first | .name // empty' \
            "$simulator_list")"
          test -n "$simulator_udid"
          echo "Using $simulator_name ($simulator_udid)"
          echo "SIMULATOR_UDID=$simulator_udid" >> "$GITHUB_ENV"
          echo "SIMULATOR_NAME=$simulator_name" >> "$GITHUB_ENV"
          xcrun simctl boot "$simulator_udid" || true
          xcrun simctl bootstatus "$simulator_udid" -b

      - name: Install and launch app
        run: |
          set -euo pipefail
          search_root="$GITHUB_WORKSPACE/ClassIsland.Mobile.Avalonia/ClassIsland.Mobile.Avalonia.iOS/bin/Debug/net8.0-ios/iossimulator-arm64"
          app_path="$(find "$search_root" -type d -name '*.app' -prune -print | sed -n '1p')"
          test -n "$app_path"
          test -f "$app_path/Info.plist"
          test -f "$app_path/Assets.car"

          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/Info.plist")"
          executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_path/Info.plist")"
          test "$bundle_id" = "cn.classisland.mobile.avalonia"
          test -f "$app_path/$executable"

          echo "SIMULATOR_APP_PATH=$app_path" >> "$GITHUB_ENV"
          echo "SIMULATOR_APP_EXECUTABLE=$executable" >> "$GITHUB_ENV"
          xcrun simctl uninstall "$SIMULATOR_UDID" "$bundle_id" 2>/dev/null || true
          xcrun simctl install "$SIMULATOR_UDID" "$app_path"

          launch_output="$(xcrun simctl launch "$SIMULATOR_UDID" "$bundle_id")"
          echo "$launch_output"
          app_pid="${launch_output##*: }"
          [[ "$app_pid" =~ ^[0-9]+$ ]]
          echo "SIMULATOR_APP_PID=$app_pid" >> "$GITHUB_ENV"

          sleep 20
          /bin/kill -0 "$app_pid"
          process_command="$(ps -p "$app_pid" -o command=)"
          test -n "$process_command"
          echo "App remained alive after 20 seconds: $process_command"

      - name: Collect simulator diagnostics
        if: always() && env.SIMULATOR_UDID != ''
        run: |
          set +e
          diagnostics="$RUNNER_TEMP/ClassIsland-iPad-Simulator"
          mkdir -p "$diagnostics"
          xcrun simctl io "$SIMULATOR_UDID" screenshot "$diagnostics/screenshot.png"
          xcrun simctl list devices > "$diagnostics/devices.txt"
          if [[ -n "${SIMULATOR_APP_EXECUTABLE:-}" ]]; then
            xcrun simctl spawn "$SIMULATOR_UDID" log show \
              --style compact \
              --last 10m \
              --predicate "process == '$SIMULATOR_APP_EXECUTABLE'" \
              > "$diagnostics/app.log" 2>&1 || true
          fi
          if [[ -n "${SIMULATOR_APP_PID:-}" ]]; then
            ps -p "$SIMULATOR_APP_PID" -o pid,ppid,state,etime,command \
              > "$diagnostics/process.txt" 2>&1 || true
          fi
          exit 0

      - name: Upload simulator diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsland-Avalonia-iPad-Simulator-${{ github.sha }}
          path: |
            ${{ runner.temp }}/ClassIsland-iPad-Simulator
            ${{ runner.temp }}/ClassIsland-Avalonia-iOS-simulator.binlog
          if-no-files-found: warn
          retention-days: 7

      - name: Shutdown iPad Simulator
        if: always() && env.SIMULATOR_UDID != ''
        run: xcrun simctl shutdown "$SIMULATOR_UDID" || true
