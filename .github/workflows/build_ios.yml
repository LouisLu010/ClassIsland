name: Build iOS

on:
  workflow_dispatch:
  push:
    paths:
      - "ClassIsland.Mobile/**"
      - ".github/workflows/build_ios.yml"
  pull_request:
    paths:
      - "ClassIsland.Mobile/**"
      - ".github/workflows/build_ios.yml"

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select simulator
        id: simulator
        shell: bash
        run: |
          device_id="$(xcrun simctl list devices available -j | jq -r '[.devices[][] | select(.name | startswith("iPhone"))][0].udid')"
          test -n "$device_id" -a "$device_id" != "null"
          echo "device_id=$device_id" >> "$GITHUB_OUTPUT"

      - name: Build and test
        working-directory: ClassIsland.Mobile
        run: >-
          xcodebuild test
          -project ClassIsland.Mobile.xcodeproj
          -scheme ClassIslandMobile
          -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}'
          CODE_SIGNING_ALLOWED=NO

      - name: Build unsigned device archive
        working-directory: ClassIsland.Mobile
        run: |
          xcodebuild archive \
            -project ClassIsland.Mobile.xcodeproj \
            -scheme ClassIslandMobile \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/ClassIsland.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        shell: bash
        run: |
          app_path="$RUNNER_TEMP/ClassIsland.xcarchive/Products/Applications/ClassIsland.app"
          test -d "$app_path"
          test -d "$app_path/PlugIns/ClassIslandLiveActivity.appex"

          package_dir="$RUNNER_TEMP/ClassIsland-ipa"
          output_dir="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$package_dir/Payload" "$output_dir"
          cp -R "$app_path" "$package_dir/Payload/"
          /usr/bin/ditto \
            -c -k --sequesterRsrc --keepParent \
            "$package_dir/Payload" \
            "$output_dir/ClassIsland-iOS-unsigned.ipa"
          /usr/bin/unzip -tqq "$output_dir/ClassIsland-iOS-unsigned.ipa"
          archive_listing="$RUNNER_TEMP/ClassIsland-ipa-files.txt"
          /usr/bin/unzip -Z1 "$output_dir/ClassIsland-iOS-unsigned.ipa" \
            > "$archive_listing"
          grep -Fxq 'Payload/ClassIsland.app/Info.plist' "$archive_listing"
          grep -Fxq \
            'Payload/ClassIsland.app/PlugIns/ClassIslandLiveActivity.appex/Info.plist' \
            "$archive_listing"
          (
            cd "$output_dir"
            shasum -a 256 "ClassIsland-iOS-unsigned.ipa" \
              > "ClassIsland-iOS-unsigned.ipa.sha256"
          )

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsland-iOS-unsigned-${{ github.sha }}
          path: |
            artifacts/ClassIsland-iOS-unsigned.ipa
            artifacts/ClassIsland-iOS-unsigned.ipa.sha256
          if-no-files-found: error
          retention-days: 14
