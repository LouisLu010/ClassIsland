name: ClassIsland.Mobile
options:
  bundleIdPrefix: cn.classisland
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1,2"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    CODE_SIGN_STYLE: Automatic
targets:
  ClassIslandMobile:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    resources:
      - path: Resources
    info:
      path: Supporting/App-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.classisland.mobile
        PRODUCT_NAME: ClassIsland
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: ClassIslandLiveActivity
        embed: true

  ClassIslandLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: LiveActivity
      - path: Shared/ScheduleActivityAttributes.swift
      - path: Shared/SchedulePhase.swift
      - path: Shared/LiveActivityLayout.swift
    info:
      path: Supporting/LiveActivity-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.classisland.mobile.liveactivity
        PRODUCT_NAME: ClassIslandLiveActivity
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../../Frameworks"

  ClassIslandMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: ClassIslandMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.classisland.mobile.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClassIsland.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ClassIsland"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ClassIslandMobile:
    build:
      targets:
        ClassIslandMobile: all
        ClassIslandLiveActivity: all
        ClassIslandMobileTests: [test]
    test:
      targets:
        - ClassIslandMobileTests
